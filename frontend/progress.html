<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Performance Analytics | EduPortal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#F8FAFC] flex h-screen overflow-hidden">

    <aside class="w-64 bg-[#2D317A] text-white flex flex-col shrink-0">
        <div class="p-8 border-b border-white/5">
            <h1 class="text-2xl font-black tracking-widest italic uppercase">EduPortal</h1>
        </div>
        <nav class="flex-1 mt-8 px-4 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/10 transition">
                <i class="fas fa-home w-5"></i> <span>Home</span>
            </a>
            <a href="calendar.html" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/10 transition">
                <i class="fas fa-calendar-alt w-5"></i> <span>Calendar</span>
            </a>
            <a href="progress.html" class="flex items-center gap-4 p-4 rounded-2xl bg-white/10 shadow-inner">
                <i class="fas fa-chart-line w-5"></i> <span class="font-bold">Progress</span>
            </a>
        </nav>
        <div class="p-4 border-t border-white/5">
            <button onclick="logout()" class="w-full flex items-center justify-center gap-3 p-4 rounded-xl bg-red-500/10 text-red-400 hover:bg-red-600 hover:text-white transition font-bold text-sm">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </aside>

    <main class="flex-1 p-8 md:p-12 overflow-y-auto">
        <header class="mb-12">
            <h2 class="text-4xl font-black text-slate-800">Performance Analytics</h2>
            <p class="text-slate-500 font-medium mt-2">Visualizing your academic journey and study patterns.</p>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                <h3 class="text-xl font-bold text-slate-800 mb-8">Weekly Study Trend</h3>
                <div class="h-80">
                    <canvas id="trendChart"></canvas>
                </div>
            </div>

            <div class="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-100">
                <h3 class="text-xl font-bold text-slate-800 mb-8">Subject Distribution</h3>
                <div class="h-80 flex items-center justify-center">
                    <canvas id="radarChart"></canvas>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            <div class="bg-[#6366f1] p-10 rounded-[2rem] shadow-lg shadow-indigo-100 text-white flex flex-col justify-between relative overflow-hidden">
                <div>
                    <h4 class="text-sm font-bold uppercase tracking-widest opacity-80 mb-2">Total Study Hours</h4>
                    <p id="total-hours" class="text-5xl font-black">0.0 hrs</p>
                </div>
                <i class="fas fa-hourglass-half absolute -bottom-6 -right-6 text-9xl opacity-20"></i>
            </div>

            <div class="bg-[#f59e0b] p-10 rounded-[2rem] shadow-lg shadow-orange-100 text-white flex flex-col justify-between relative overflow-hidden">
                 <div>
                    <h4 class="text-sm font-bold uppercase tracking-widest opacity-80 mb-2">Learning Streak</h4>
                    <p id="learning-streak" class="text-5xl font-black">0 Days</p> 
                </div>
                <i class="fas fa-fire absolute -bottom-6 -right-6 text-9xl opacity-20"></i>
            </div>
        </div>
    </main>

    <script type="module">
        const localUser = JSON.parse(localStorage.getItem('currentUser'));
        const token = localStorage.getItem('token');
        if (!localUser || !token) window.location.href = 'login.html';

        let radarChartRef = null;
        let trendChartRef = null;

        async function fetchUserData() {
            try {
                const res = await fetch('/user/profile', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    const studyTime = data.studyTimeData || {};
                    const subjects = data.subjects || [];

                    // 1. Calculate Real Totals
                    const subjectValues = subjects.map(s => studyTime[s] || 0);
                    const totalHours = subjectValues.reduce((a, b) => a + b, 0);
                    document.getElementById('total-hours').innerText = `${totalHours.toFixed(1)} hrs`;
                    document.getElementById('learning-streak').innerText = `${data.streak || 0} Days`;

                    // 2. Render Charts with Real Data
                    updateRadarChart(subjects, subjectValues);
                    updateTrendChart(data.weeklyStats);
                } else {
                    if (res.status === 401) window.logout();
                }
            } catch (err) {
                console.error("Error fetching data:", err);
            }
        }

        fetchUserData();

        function updateRadarChart(labels, values) {
            const ctx = document.getElementById('radarChart').getContext('2d');
            if (radarChartRef) radarChartRef.destroy();

            radarChartRef = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: labels,
                    datasets: [{
                        label: 'Hours Spent',
                        data: values,
                        backgroundColor: 'rgba(99, 102, 241, 0.2)',
                        borderColor: '#6366f1',
                        borderWidth: 2,
                        pointBackgroundColor: '#6366f1'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: {
                        r: { 
                            beginAtZero: true,
                            grid: { color: 'rgba(0,0,0,0.05)' },
                            pointLabels: { font: { size: 12, weight: 'bold' } }
                        }
                    }
                }
            });
        }

        function updateTrendChart(weeklyData) {
            const ctx = document.getElementById('trendChart').getContext('2d');
            if (trendChartRef) trendChartRef.destroy();

            // Fallback: If no weekly data exists, we show a 'Flat' line of total hours 
            // divided by 7 to maintain the UI while waiting for user activity.
            const displayData = weeklyData ? Object.values(weeklyData) : [0, 0, 0, 0, 0, 0, 0];

            trendChartRef = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Day 1', 'Day 2', 'Day 3', 'Day 4', 'Day 5', 'Day 6', 'Day 7'],
                    datasets: [{
                        label: 'Study Intensity',
                        data: displayData,
                        borderColor: '#6366f1',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { beginAtZero: true, grid: { color: 'rgba(0,0,0,0.05)' } },
                        x: { grid: { display: false } }
                    }
                }
            });
        }

        window.logout = () => { localStorage.clear(); window.location.href = 'login.html'; };
    </script>
</body>
</html>
