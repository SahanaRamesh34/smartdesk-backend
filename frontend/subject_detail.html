<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resources & Forum | EduPortal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .resource-card { transition: all 0.3s ease; border: 1px solid #f1f5f9; }
        .resource-card:hover { transform: translateY(-5px); border-color: #6366f1; box-shadow: 0 10px 20px rgba(99, 102, 241, 0.1); }
        .tab-btn { padding: 1rem; font-weight: 700; color: #64748b; border-bottom: 2px solid transparent; transition: 0.2s; }
        .tab-active { color: #6366f1; border-bottom-color: #6366f1; }
        .spinner { border: 3px solid rgba(0,0,0,0.1); border-radius: 50%; border-top: 3px solid #6366f1; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-[#F8FAFC] min-h-screen">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-4">
                <button onclick="window.history.back()" class="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 hover:bg-indigo-600 hover:text-white transition">
                    <i class="fas fa-arrow-left"></i>
                </button>
                <h1 id="subject-display-title" class="text-2xl font-black text-slate-800 capitalize italic">Subject</h1>
            </div>
            <div id="add-btn-container">
                <button onclick="openAddModal()" class="bg-indigo-600 text-white px-6 py-2.5 rounded-xl font-bold hover:bg-indigo-700 transition shadow-lg shadow-indigo-100">
                    <i class="fas fa-plus mr-2"></i> Add Resource
                </button>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-6 md:p-10">
        <div class="flex gap-8 border-b border-slate-200 mb-10 overflow-x-auto">
            <button onclick="switchTab('notes')" id="tab-notes" class="tab-btn tab-active whitespace-nowrap">Notes</button>
            <button onclick="switchTab('books')" id="tab-books" class="tab-btn whitespace-nowrap">Books</button>
            <button onclick="switchTab('links')" id="tab-links" class="tab-btn whitespace-nowrap">Links</button>
            <button onclick="switchTab('forum')" id="tab-forum" class="tab-btn whitespace-nowrap">Forum / Q&A</button>
        </div>

        <div id="main-content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
        </div>
    </main>

    <div id="addModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-[100] p-6">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl">
            <h3 id="modal-title" class="text-2xl font-black text-slate-800 mb-6">Add Item</h3>
            <div class="space-y-4">
                <input type="text" id="input-title" placeholder="Title" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                <div id="file-section">
                    <input type="file" id="input-file" class="w-full p-4 bg-slate-50 border border-dashed rounded-2xl">
                </div>
                <div id="link-section" class="hidden">
                    <input type="text" id="input-url" placeholder="https://..." class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
                </div>
            </div>
            <div class="flex gap-4 mt-8">
                <button onclick="closeAddModal()" class="flex-1 font-bold text-slate-400">Cancel</button>
                <button onclick="saveResource()" id="save-btn" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold shadow-lg">Save to Cloud</button>
            </div>
        </div>
    </div>

<script>
    const token = localStorage.getItem('token');
    const localUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!token || !localUser) window.location.href = "login.html";

    const urlParams = new URLSearchParams(window.location.search);
    const subject = urlParams.get('name') || "Subject";
    document.getElementById('subject-display-title').innerText = subject;
    let currentTab = 'notes';

    async function render() {
        const container = document.getElementById('main-content');
        container.innerHTML = `<div class="col-span-full py-10 text-center"><div class="spinner"></div><p>Fetching Data...</p></div>`;
        
        if (currentTab === 'forum') {
            container.className = 'max-w-4xl mx-auto space-y-6';
            document.getElementById('add-btn-container').classList.add('hidden');
            
            try {
                const res = await fetch(`/forum?subject=${subject}`, { headers: { 'Authorization': `Bearer ${token}` } });
                const posts = await res.json();

                container.innerHTML = `
                    <div class="bg-white p-6 rounded-3xl shadow-sm mb-8 border border-slate-100">
                        <h4 class="font-bold text-lg text-slate-800 mb-4">Ask a Question</h4>
                        <input type="text" id="post-title" placeholder="Topic" class="w-full p-4 bg-slate-50 border rounded-2xl mb-4 outline-none focus:ring-2 focus:ring-indigo-500">
                        <textarea id="post-body" placeholder="Describe your doubt..." class="w-full p-4 bg-slate-50 border rounded-2xl mb-4 outline-none focus:ring-2 focus:ring-indigo-500" rows="3"></textarea>
                        <button onclick="submitPost()" class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 transition">Post Discussion</button>
                    </div>
                `;

                if(posts.length === 0) {
                    container.innerHTML += `<div class="py-20 text-center text-slate-400 font-bold">No discussions yet. Be the first to ask!</div>`;
                }

                posts.forEach(p => {
                    let repliesHtml = p.replies.map(r => `
                        <div class="ml-4 md:ml-8 mt-4 p-5 bg-slate-50 rounded-2xl border border-slate-100">
                            <p class="text-sm font-bold text-slate-800 mb-2">${r.authorName} <span class="text-[10px] text-slate-500 uppercase tracking-widest bg-slate-200 px-2 py-1 rounded ml-2">${r.authorRole}</span></p>
                            <p class="text-slate-600">${r.body}</p>
                        </div>
                    `).join('');

                    container.innerHTML += `
                        <div class="bg-white p-6 md:p-8 rounded-[2rem] shadow-sm border border-slate-100">
                            <div class="flex justify-between items-start mb-2">
                                <h4 class="text-xl font-bold text-slate-800">${p.title}</h4>
                                <span class="text-[10px] font-bold text-slate-500 bg-slate-100 px-3 py-1 rounded-full uppercase tracking-widest">${p.authorRole}</span>
                            </div>
                            <p class="text-xs text-slate-400 font-bold mb-4">Posted by ${p.authorName}</p>
                            <p class="text-slate-700 mb-6 leading-relaxed">${p.body}</p>
                            
                            <div class="replies-section mb-6">
                                ${repliesHtml}
                            </div>
                            
                            <div class="mt-6 flex flex-col md:flex-row gap-4">
                                <input type="text" id="reply-${p._id}" placeholder="Write a reply..." class="flex-1 p-4 bg-slate-50 border rounded-xl outline-none focus:ring-2 focus:ring-indigo-500">
                                <button onclick="submitReply('${p._id}')" class="bg-slate-800 text-white px-8 py-4 rounded-xl font-bold hover:bg-slate-700 transition whitespace-nowrap">Reply</button>
                            </div>
                        </div>
                    `;
                });
            } catch (err) { console.error(err); }
            return;
        }

        // Render Resources (Notes, Books, Links)
        container.className = 'grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8';
        document.getElementById('add-btn-container').classList.remove('hidden');

        try {
            let facultyItems = [];
            let myItems = [];

            const resGlobal = await fetch(`/resources?subject=${subject}`, { headers: { 'Authorization': `Bearer ${token}` } });
            if (resGlobal.ok) {
                const allGlobal = await resGlobal.json();
                facultyItems = allGlobal.filter(item => item.type === currentTab);
            }

            if (localUser.role === 'student') {
                const resPrivate = await fetch('/user/profile', { headers: { 'Authorization': `Bearer ${token}` } });
                if (resPrivate.ok) {
                    const data = await resPrivate.json();
                    myItems = (data.resources && data.resources[subject] && data.resources[subject][currentTab]) 
                                  ? data.resources[subject][currentTab] : [];
                } else if (resPrivate.status === 401) {
                    window.location.href = "login.html";
                }
            }

            container.innerHTML = '';
            
            if (facultyItems.length > 0) {
                container.innerHTML += `<div class="col-span-full"><h3 class="text-xl font-black text-slate-800 italic uppercase mb-4 border-b pb-2">Faculty Materials</h3></div>`;
                facultyItems.forEach((item) => {
                    const canDelete = localUser.role === 'teacher' && localUser._id === item.authorId;
                    container.innerHTML += `
                        <div class="resource-card bg-white p-8 rounded-[2rem] cursor-pointer relative group" onclick="window.openResource('${item.data}')">
                            ${canDelete ? `
                                <button onclick="event.stopPropagation(); window.deleteGlobalResource('${item._id}')" class="absolute top-6 right-6 w-8 h-8 bg-red-50 text-red-500 rounded-lg flex items-center justify-center opacity-0 group-hover:opacity-100 transition hover:bg-red-500 hover:text-white">
                                    <i class="fas fa-trash-alt text-xs"></i>
                                </button>
                            ` : ''}
                            <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-lg flex items-center justify-center mb-4">
                                <i class="fas fa-chalkboard-teacher"></i>
                            </div>
                            <h4 class="text-lg font-bold text-slate-800">${item.title}</h4>
                            <p class="text-[10px] font-bold text-slate-400 uppercase mt-2 tracking-widest">By ${item.authorName}</p>
                        </div>`;
                });
            }

            if (localUser.role === 'student' && myItems.length > 0) {
                container.innerHTML += `<div class="col-span-full mt-8"><h3 class="text-xl font-black text-slate-800 italic uppercase mb-4 border-b pb-2">My Private Uploads</h3></div>`;
                myItems.forEach((item) => {
                    container.innerHTML += `
                        <div class="resource-card bg-white p-8 rounded-[2rem] cursor-pointer relative group" onclick="window.openResource('${item.data}')">
                            <button onclick="event.stopPropagation(); window.deletePrivateResource('${item.id}')" class="absolute top-6 right-6 w-8 h-8 bg-red-50 text-red-500 rounded-lg flex items-center justify-center opacity-0 group-hover:opacity-100 transition hover:bg-red-500 hover:text-white">
                                <i class="fas fa-trash-alt text-xs"></i>
                            </button>
                            <div class="w-10 h-10 bg-slate-50 text-slate-600 rounded-lg flex items-center justify-center mb-4">
                                <i class="fas fa-file-alt"></i>
                            </div>
                            <h4 class="text-lg font-bold text-slate-800">${item.title}</h4>
                        </div>`;
                });
            }

            if (facultyItems.length === 0 && myItems.length === 0) {
                container.innerHTML = `<div class="col-span-full py-20 text-center text-slate-400">No ${currentTab} found.</div>`;
            }

        } catch (err) {
            console.error(err);
        }
    }

    window.switchTab = (tab) => {
        currentTab = tab;
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('tab-active'));
        document.getElementById(`tab-${tab}`).classList.add('tab-active');
        
        if (tab === 'links') {
            document.getElementById('file-section').classList.add('hidden');
            document.getElementById('link-section').classList.remove('hidden');
        } else {
            document.getElementById('file-section').classList.remove('hidden');
            document.getElementById('link-section').classList.add('hidden');
        }
        render();
    };

    window.openAddModal = () => document.getElementById('addModal').classList.replace('hidden', 'flex');
    window.closeAddModal = () => document.getElementById('addModal').classList.replace('flex', 'hidden');
    window.openResource = (url) => window.open(url, '_blank');
    
    window.submitPost = async () => {
        const title = document.getElementById('post-title').value;
        const body = document.getElementById('post-body').value;
        if(!title || !body) return alert("Fill all fields");

        try {
            const res = await fetch('/forum', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ subject, title, body })
            });
            if(res.ok) render();
            else alert("Failed to post");
        } catch(err) { alert(err.message); }
    };

    window.submitReply = async (postId) => {
        const body = document.getElementById(`reply-${postId}`).value;
        if(!body) return alert("Reply cannot be empty");

        try {
            const res = await fetch(`/forum/${postId}/reply`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                body: JSON.stringify({ body })
            });
            if(res.ok) render();
            else alert("Failed to reply");
        } catch(err) { alert(err.message); }
    };

    window.saveResource = async () => {
        const title = document.getElementById('input-title').value;
        if (!title) return alert("Title required");
        
        const formData = new FormData();
        formData.append('subject', subject);
        formData.append('type', currentTab);
        formData.append('title', title);
        
        if (currentTab === 'links') {
            const url = document.getElementById('input-url').value;
            if (!url) return alert("URL required");
            formData.append('url', url);
        } else {
            const fileInput = document.getElementById('input-file');
            if (fileInput.files.length === 0) return alert("File required");
            formData.append('file', fileInput.files[0]);
        }
        
        document.getElementById('save-btn').innerText = "Uploading...";
        document.getElementById('save-btn').disabled = true;

        const uploadUrl = localUser.role === 'teacher' ? '/resources' : '/user/resource';

        try {
            const res = await fetch(uploadUrl, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}` },
                body: formData
            });
            if (res.ok) {
                document.getElementById('input-title').value = '';
                document.getElementById('input-url').value = '';
                document.getElementById('input-file').value = '';
                closeAddModal();
                render();
            } else {
                const err = await res.json();
                alert(err.message || "Failed to upload");
            }
        } catch (err) {
            alert(err.message);
        } finally {
            document.getElementById('save-btn').innerText = "Save to Cloud";
            document.getElementById('save-btn').disabled = false;
        }
    };

    window.deleteGlobalResource = async (id) => {
        if (!confirm("Are you sure you want to delete this global resource? This will remove it for all students.")) return;
        try {
            const res = await fetch(`/resources/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) render();
            else alert("Failed to delete");
        } catch (err) { alert(err.message); }
    };

    window.deletePrivateResource = async (id) => {
        if (!confirm("Delete this private note?")) return;
        try {
            const res = await fetch(`/user/resource/${encodeURIComponent(subject)}/${currentTab}/${id}`, {
                method: 'DELETE',
                headers: { 'Authorization': `Bearer ${token}` }
            });
            if (res.ok) render();
            else alert("Failed to delete");
        } catch (err) { alert(err.message); }
    };

    render();
</script>
</body>
</html>
