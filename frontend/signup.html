<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Join EduPortal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-slate-50 flex items-center justify-center min-h-screen p-6">
    <div class="bg-white w-full max-w-lg rounded-[2.5rem] p-10 shadow-xl">
        <h2 class="text-3xl font-black text-slate-800 mb-6 italic uppercase text-center">Create Account</h2>
        
        <div class="space-y-4">
            <input type="text" id="sup-name" placeholder="Full Name" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
            <input type="text" id="sup-reg" placeholder="Registration Number / ID" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
            <input type="email" id="sup-email" placeholder="Email Address" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
            <input type="password" id="sup-pass" placeholder="Create Password" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
            <input type="text" id="sup-subjects" placeholder="Subjects (Comma separated, e.g. MATHS, OS)" class="w-full p-4 bg-slate-50 border rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500">
            
            <div class="pt-4 border-t">
                <label class="block text-xs font-bold text-slate-400 mb-2 uppercase">Faculty Access Code (Optional)</label>
                <input type="text" id="invite-code" placeholder="Enter code for Teacher access" class="w-full p-4 bg-indigo-50 border-indigo-100 border rounded-2xl outline-none">
            </div>
        </div>

        <button id="signup-btn" class="w-full mt-8 py-4 bg-indigo-600 text-white rounded-2xl font-bold hover:bg-indigo-700 transition">Complete Registration</button>
        <p class="text-center mt-6 text-sm text-slate-500">Already have an account? <a href="login.html" class="text-indigo-600 font-bold">Login</a></p>
    </div>

    <script type="module">
        document.getElementById('signup-btn').addEventListener('click', async () => {
            const email = document.getElementById('sup-email').value;
            const pass = document.getElementById('sup-pass').value;
            const name = document.getElementById('sup-name').value;
            const regNo = document.getElementById('sup-reg').value;
            const code = document.getElementById('invite-code').value;
            const subjects = document.getElementById('sup-subjects').value.split(',').map(s => s.trim().toUpperCase());

            const userRole = (code === 'VIT_PRO_2026') ? 'teacher' : 'student';

            try {
                const response = await fetch('/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        name, email, password: pass, regNo, subjects, role: userRole 
                    })
                });
                
                const data = await response.json();
                if (response.ok) {
                    alert(`Successfully registered as a ${userRole}!`);
                    window.location.href = "login.html";
                } else {
                    throw new Error(data.message || "Registration Failed");
                }
            } catch (err) { alert("Error: " + err.message); }
        });
    </script>
</body>
</html>
