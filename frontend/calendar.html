<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Calendar | EduPortal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.10/index.global.min.js'></script>
    <style>
        :root { --fc-button-bg-color: #6366f1; --fc-button-border-color: #6366f1; --fc-event-bg-color: #6366f1; }
        .fc { background: white; padding: 2rem; border-radius: 2.5rem; border: none; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); }
        .fc-toolbar-title { font-weight: 900 !important; font-style: italic; color: #1e293b; text-transform: uppercase; }
    </style>
</head>
<body class="bg-[#F8FAFC] flex h-screen overflow-hidden">

    <aside class="w-64 bg-[#2D317A] text-white flex flex-col shrink-0">
        <div class="p-8 border-b border-white/5"><h1 class="text-2xl font-black italic">EDUPORTAL</h1></div>
        <nav class="flex-1 mt-8 px-4 space-y-2">
            <a href="dashboard.html" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/10 transition">
                <i class="fas fa-home w-5"></i> <span>Home</span>
            </a>
            <a href="calendar.html" class="flex items-center gap-4 p-4 rounded-2xl bg-white/10 shadow-inner">
                <i class="fas fa-calendar-alt w-5"></i> <span class="font-bold">Calendar</span>
            </a>
            <a href="progress.html" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/10 transition">
                <i class="fas fa-chart-line w-5"></i> <span>Progress</span>
            </a>
        </nav>
    </aside>

    <main class="flex-1 p-12 overflow-y-auto">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-4xl font-black text-slate-800 italic">Academic Calendar</h2>
            <button onclick="document.getElementById('addEventModal').classList.replace('hidden', 'flex')" class="bg-indigo-600 text-white px-8 py-4 rounded-2xl font-bold shadow-lg">
                <i class="fas fa-plus mr-2"></i> Add Event
            </button>
        </div>

        <div id='calendar'></div>
    </main>

    <div id="addEventModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-md hidden items-center justify-center z-50 p-6">
        <div class="bg-white w-full max-w-md rounded-[2.5rem] p-10 shadow-2xl">
            <h3 class="text-2xl font-black text-slate-800 mb-6">Schedule Task</h3>
            <input type="text" id="event-title" placeholder="Event Name" class="w-full p-4 bg-slate-50 border rounded-2xl mb-4 outline-none">
            <input type="date" id="event-date" class="w-full p-4 bg-slate-50 border rounded-2xl mb-4 outline-none">
            
            <div class="flex items-center gap-4 mb-4">
                <input type="time" id="event-time" class="flex-1 p-4 bg-slate-50 border rounded-2xl outline-none">
                <label class="flex items-center gap-2 text-sm font-bold text-slate-600">
                    <input type="checkbox" id="event-allday" class="w-5 h-5 rounded text-indigo-600"> All Day
                </label>
            </div>

            <select id="event-reminder" class="w-full p-4 bg-slate-50 border rounded-2xl mb-8 outline-none">
                <option value="none">No Reminder</option>
                <option value="0">At start of event</option>
                <option value="60">1 Hour before</option>
                <option value="1440">1 Day before</option>
            </select>

            <div class="flex gap-4">
                <button onclick="document.getElementById('addEventModal').classList.replace('flex', 'hidden')" class="flex-1 font-bold text-slate-400">Cancel</button>
                <button id="save-event-btn" class="flex-1 py-4 bg-indigo-600 text-white rounded-2xl font-bold">Add to Grid</button>
            </div>
        </div>
    </div>

    <script type="module">
        const localUser = JSON.parse(localStorage.getItem('currentUser'));
        const token = localStorage.getItem('token');
        if (!localUser || !token) window.location.href = 'login.html';
        let calendar;
        let cloudEvents = [];
        let reminderInterval;

        document.addEventListener('DOMContentLoaded', function() {
            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
                events: [] 
            });
            calendar.render();
            fetchEvents();

            document.getElementById('event-allday').addEventListener('change', (e) => {
                document.getElementById('event-time').disabled = e.target.checked;
            });

            if ("Notification" in window && Notification.permission !== "granted" && Notification.permission !== "denied") {
                Notification.requestPermission();
            }
        });

        function startReminderService(events) {
            if (reminderInterval) clearInterval(reminderInterval);
            
            const check = () => {
                const now = new Date();
                let notifiedList = JSON.parse(localStorage.getItem('notifiedEvents') || '[]');

                events.forEach(ev => {
                    if (ev.reminder && ev.reminder !== 'none' && !notifiedList.includes(ev.id)) {
                        let eventDate;
                        if (ev.allDay) {
                            eventDate = new Date(`${ev.date}T00:00:00`);
                        } else {
                            eventDate = new Date(`${ev.date}T${ev.time || '00:00'}:00`);
                        }
                        
                        const reminderOffsetMs = parseInt(ev.reminder) * 60 * 1000;
                        const triggerTime = new Date(eventDate.getTime() - reminderOffsetMs);

                        if (now >= triggerTime && now <= new Date(eventDate.getTime() + 60000)) {
                            if ("Notification" in window && Notification.permission === "granted") {
                                new Notification("EduPortal Reminder", { body: `Upcoming Event: ${ev.title}` });
                            } else {
                                alert(`Reminder: ${ev.title} is coming up!`);
                            }
                            notifiedList.push(ev.id);
                            localStorage.setItem('notifiedEvents', JSON.stringify(notifiedList));
                        }
                    }
                });
            };
            
            check();
            reminderInterval = setInterval(check, 60000);
        }

        async function fetchEvents() {
            try {
                const res = await fetch('/user/profile', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    cloudEvents = data.events || [];
                    const formattedEvents = cloudEvents.map(ev => ({
                        title: ev.title,
                        start: ev.allDay ? ev.date : `${ev.date}T${ev.time || '00:00'}`,
                        allDay: ev.allDay
                    }));
                    calendar.removeAllEvents();
                    calendar.addEventSource(formattedEvents);
                    startReminderService(cloudEvents);
                } else if (res.status === 401) {
                    window.location.href = 'login.html';
                }
            } catch (err) {
                console.error(err);
            }
        }

        document.getElementById('save-event-btn').addEventListener('click', async () => {
            const title = document.getElementById('event-title').value;
            const date = document.getElementById('event-date').value;
            const time = document.getElementById('event-time').value;
            const allDay = document.getElementById('event-allday').checked;
            const reminder = document.getElementById('event-reminder').value;

            if(!title || !date) return alert("Please fill details");

            const newEvent = { title, date, time, allDay, reminder, id: Date.now() };
            cloudEvents.push(newEvent);

            try {
                const res = await fetch('/user/profile', {
                    method: 'PUT',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ events: cloudEvents })
                });
                if (res.ok) {
                    fetchEvents();
                    document.getElementById('addEventModal').classList.replace('flex', 'hidden');
                } else {
                    alert('Failed to save event');
                }
            } catch (err) {
                alert(err.message);
            }
        });
    </script>
</body>
</html>
