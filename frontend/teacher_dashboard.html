<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Faculty Dashboard | EduPortal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body class="bg-[#F8FAFC] flex h-screen overflow-hidden">

    <aside class="w-64 bg-[#1E293B] text-white flex flex-col shrink-0">
        <div class="p-8 border-b border-white/5">
            <h1 class="text-2xl font-black italic uppercase tracking-wider">EduPortal</h1>
            <p class="text-[10px] text-slate-400 font-bold uppercase mt-1 tracking-widest">Faculty Edition</p>
        </div>
        
        <nav class="flex-1 mt-8 px-4 space-y-2">
            <a href="teacher_dashboard.html" class="flex items-center gap-4 p-4 rounded-2xl bg-white/10 shadow-inner">
                <i class="fas fa-users w-5"></i> <span class="font-bold">Student Directory</span>
            </a>
            <a href="teacher_announcements.html" class="flex items-center gap-4 p-4 rounded-2xl hover:bg-white/5 transition">
                <i class="fas fa-bullhorn w-5"></i> <span>Announcements</span>
            </a>
        </nav>

        <div class="p-4 border-t border-white/5">
            <button onclick="logout()" class="w-full flex items-center justify-center gap-3 p-4 rounded-xl bg-red-500/10 text-red-400 hover:bg-red-600 hover:text-white transition font-bold text-sm">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </aside>

    <main class="flex-1 p-12 overflow-y-auto">
        <header class="flex justify-between items-center mb-12">
            <div>
                <h2 class="text-4xl font-black text-slate-800 italic uppercase">My Subjects</h2>
                <p class="text-slate-400 font-bold text-sm mt-1 uppercase tracking-widest">Manage Course Materials & Forums</p>
            </div>
        </header>

        <div id="subject-grid" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-8 pb-12">
        </div>
    </main>

    <script type="module">
        const localUser = JSON.parse(localStorage.getItem('currentUser'));
        const token = localStorage.getItem('token');
        if (!localUser || localUser.role !== 'teacher' || !token) window.location.href = "login.html";

        // Render Subjects
        const subjectGrid = document.getElementById('subject-grid');
        const subjects = localUser.subjects || [];
        if (subjects.length === 0) {
            subjectGrid.innerHTML = `<p class="text-slate-400 col-span-full">No subjects assigned.</p>`;
        } else {
            subjects.forEach(sub => {
                subjectGrid.innerHTML += `
                    <a href="subject_detail.html?name=${sub}" class="bg-indigo-600 p-8 rounded-[2.5rem] shadow-lg hover:shadow-indigo-500/30 hover:-translate-y-2 transition block text-white">
                        <div class="w-14 h-14 bg-white/20 rounded-2xl flex items-center justify-center text-xl mb-6">
                            <i class="fas fa-book"></i>
                        </div>
                        <h4 class="text-2xl font-black italic uppercase">${sub}</h4>
                        <p class="text-indigo-200 mt-2 font-bold text-sm">Upload Resources & Answer Doubts</p>
                    </a>`;
            });
        }

        window.logout = () => { localStorage.clear(); window.location.href = "login.html"; };
    </script>
</body>
</html>
